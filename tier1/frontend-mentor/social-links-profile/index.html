<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Social links profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,700;1,14..32,700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,600;1,14..32,600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz@0,14..32;1,14..32&display=swap"
      rel="stylesheet"
    />

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="social-card">
      <div class="about-me">
        <img
          class="profile-picture"
          src="./assets/images/avatar-jessica.jpeg"
          alt="Jessica Randall"
        />
        <h1 class="name">Jessica Randall</h1>
        <h2 class="location">London, United Kingdom</h2>
        <h3 class="bio">"Front-end developer and avid reader."</h3>
      </div>

      <ul class="social-links">
        <li><a class="link" href="#">GitHub</a></li>
        <li><a class="link" href="#">Frontend Mentor</a></li>
        <li><a class="link" href="#">LinkedIn</a></li>
        <li><a class="link" href="#">Twitter</a></li>
        <li><a class="link" href="#">Instragram</a></li>
      </ul>
    </div>
  </body>
</html>
