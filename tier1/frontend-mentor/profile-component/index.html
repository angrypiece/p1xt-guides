<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
    <meta name="description" content="profile card" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@300;700&display=swap"
      rel="stylesheet"
    />
    <title>Frontend Mentor | Profile card component</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <section class="profile-card">
        <div class="bg-img">
          <img
            src="./images/image-victor.jpg"
            alt="Victor Crest"
            class="profile-img"
          />
        </div>
        <div class="bg-white-container">
          <div id="name-age">
            <h1>Victor Crest <span class="light-text">26</span></h1>
            <h2 class="light-text">London</h2>
          </div>
          <div aria-hidden="true" class="divider"></div>
          <ul id="profile-info">
            <li class="profile-count">
              <strong>80K</strong>
              <span class="light-text">Followers</span>
            </li>
            <li class="profile-count">
              <strong>803K</strong>
              <span class="light-text">Likes</span>
            </li>
            <li class="profile-count">
              <strong>1.4K</strong>
              <span class="light-text">Photos</span>
            </li>
          </ul>
        </div>
      </section>
    </main>
  </body>
</html>
